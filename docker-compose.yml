services:
  backend:
    restart: unless-stopped
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      HISTORICAL_LOOKBACK_CALENDAR_DAYS: "1825"
      DHAN_HISTORICAL_DAILY_SUPPORTED_YEARS: "5"
      DATA_MAINTENANCE_ENABLED: "false"
      DATA_MAINTENANCE_CHECK_INTERVAL_SECONDS: "3600"
      AUTO_PURGE_MARKET_DATA: "false"
      DATA_RETENTION_CALENDAR_DAYS: "365"
      REVERSAL_OPPORTUNITY_AUTOMATION_ENABLED: "false"
      DEMO_AUTOMATION_ENABLED: "false"
    volumes:
      - dhan-auth-data:/app/data
    ports:
      - "8000:8000"

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  dhan-auth-data:
