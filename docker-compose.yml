services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      NSE_IMPORT_INBOX_PATH: /app/nse_import_inbox
    volumes:
      - dhan-auth-data:/app/data
      - ./nse_import_inbox:/app/nse_import_inbox
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  dhan-auth-data:
