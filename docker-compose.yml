services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - dhan-auth-data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  dhan-auth-data:
