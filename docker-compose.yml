services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      BHAVCOPY_IMPORT_INBOX_PATH: /app/bhavcopy_inbox
    volumes:
      - app-data:/app/data
      - ./bhavcopy_inbox:/app/bhavcopy_inbox
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  app-data:
