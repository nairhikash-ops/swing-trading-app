services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      HISTORICAL_LOOKBACK_CALENDAR_DAYS: "365"
      DATA_MAINTENANCE_ENABLED: "true"
      DATA_MAINTENANCE_CHECK_INTERVAL_SECONDS: "3600"
      DATA_RETENTION_CALENDAR_DAYS: "365"
    volumes:
      - dhan-auth-data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  dhan-auth-data:
